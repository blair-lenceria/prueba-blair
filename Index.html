<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blair Admin | Laboratorio</title>
    
    <link rel="manifest" href="manifest.json">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.js"></script>

    <style>
        :root {
            --blair-pink: #fdf2f4;
            --blair-dark: #4a4a4a;
            --blair-accent: #d8a7b1;
            --blair-btn-hover: #c4929c;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            background-color: var(--blair-pink);
            color: var(--blair-dark);
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; }
        p { font-size: 14px; color: #777; margin-bottom: 30px; }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        .btn {
            display: inline-block;
            background-color: var(--blair-accent);
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .btn:hover { background-color: var(--blair-btn-hover); }
        
        input[type="file"] { display: none; }

        #preview {
            max-width: 100%;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        #downloadBtn { display: none; margin-top: 20px; }

        #stats {
            display: none;
            background-color: #f8f9fa;
            border: 1px dashed var(--blair-accent);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 14px;
            color: var(--blair-dark);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <h1>BLAIR</h1>
    <p>Laboratorio de Optimización</p>

    <div class="card">
        <label for="imageInput" class="btn">Subir Foto de Prueba</label>
        <input type="file" id="imageInput" accept="image/*">
        
        <p id="statusText" style="display:none; color: var(--blair-accent); font-weight: bold;">Procesando...</p>

        <div id="stats"></div>

        <img id="preview" alt="Vista previa">
        <a id="downloadBtn" class="btn">Descargar .WebP Optimizado</a>
    </div>

    <script>
        // Registrar Service Worker apuntando al nuevo nombre
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
            });
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        document.getElementById('imageInput').addEventListener('change', async function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const originalSize = file.size;
            const statusText = document.getElementById('statusText');
            const statsBox = document.getElementById('stats');
            const preview = document.getElementById('preview');
            const downloadBtn = document.getElementById('downloadBtn');

            statsBox.style.display = 'none';
            preview.style.display = 'none';
            downloadBtn.style.display = 'none';
            statusText.style.display = 'block';

            const options = { maxSizeMB: 1, maxWidthOrHeight: 1200, useWebWorker: true };

            try {
                const compressedFile = await imageCompression(file, options);
                const img = new Image();
                img.src = URL.createObjectURL(compressedFile);
                
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    
                    const fontSize = Math.floor(canvas.width * 0.05);
                    ctx.font = `bold ${fontSize}px sans-serif`;
                    ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
                    ctx.textAlign = "right";
                    ctx.fillText("Blair", canvas.width - 20, canvas.height - 30);
                    
                    canvas.toBlob((blob) => {
                        const finalSize = blob.size;
                        statsBox.innerHTML = `
                            <strong>¡Optimización Exitosa!</strong><br>
                            Original: ${formatBytes(originalSize)}<br>
                            Nuevo: <b>${formatBytes(finalSize)}</b>
                        `;
                        statsBox.style.display = 'block';

                        const finalUrl = URL.createObjectURL(blob);
                        preview.src = finalUrl;
                        preview.style.display = 'block';
                        downloadBtn.href = finalUrl;
                        downloadBtn.download = `foto_optimizada.webp`;
                        downloadBtn.style.display = 'block';
                        statusText.style.display = 'none';
                    }, 'image/webp', 0.8);
                };
            } catch (error) {
                statusText.innerText = "Error al procesar.";
            }
        });
    </script>
</body>
</html>
